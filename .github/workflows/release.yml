name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            artifact-name: create-sbx-linux-amd64
          - rid: linux-arm64
            artifact-name: create-sbx-linux-arm64
          - rid: osx-x64
            artifact-name: create-sbx-macos-amd64
          - rid: osx-arm64
            artifact-name: create-sbx-macos-arm64
          - rid: win-x64
            artifact-name: create-sbx-windows-amd64.exe
          - rid: win-arm64
            artifact-name: create-sbx-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish create-sbx.cs -r ${{ matrix.rid }} -o ./output

      - name: Rename binary
        run: |
          if [ -f ./output/create-sbx.exe ]; then
            mv ./output/create-sbx.exe ./output/${{ matrix.artifact-name }}
          else
            mv ./output/create-sbx ./output/${{ matrix.artifact-name }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ./output/${{ matrix.artifact-name }}

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create release
        run: >
          gh release create ${{ github.ref_name }}
          ./artifacts/*
          --title "${{ github.ref_name }}"
          --generate-notes
          --draft
          --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
