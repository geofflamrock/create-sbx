name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            artifact-name: create-sbx-linux-amd64
            binary-name: create-sbx
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            artifact-name: create-sbx-linux-arm64
            binary-name: create-sbx
          - rid: osx-x64
            os: macos-latest
            artifact-name: create-sbx-macos-amd64
            binary-name: create-sbx
          - rid: osx-arm64
            os: macos-latest
            artifact-name: create-sbx-macos-arm64
            binary-name: create-sbx
          - rid: win-x64
            os: windows-latest
            artifact-name: create-sbx-windows-amd64.exe
            binary-name: create-sbx.exe
          - rid: win-arm64
            os: windows-11-arm
            artifact-name: create-sbx-windows-arm64.exe
            binary-name: create-sbx.exe

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION="0.0.0-pr${{ github.event.pull_request.number }}"
          else
            BRANCH="${{ github.ref_name }}"
            VERSION="0.0.0-${BRANCH//[^a-zA-Z0-9-]/-}"
          fi
          dotnet publish create-sbx.cs -r ${{ matrix.rid }} -o ./output -p:Version="$VERSION"

      - name: Verify --version
        shell: bash
        run: ./output/${{ matrix.binary-name }} --version

      - name: Rename binary
        shell: bash
        run: mv ./output/${{ matrix.binary-name }} ./output/${{ matrix.artifact-name }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ./output/${{ matrix.artifact-name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Upload release assets
        run: gh release upload ${{ github.ref_name }} ./artifacts/* --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
